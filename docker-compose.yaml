
services:
  db:
    container_name: postgres
    image: postgres:18
    restart: always
    env_file:
      - .env
    ports:
      - '${DB_PORT}:5432'
    environment:
      POSTGRES_DB: ${DB_NAME} # Questo crea anche il database in Postgres
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes: 
    # Questo volume contiene una cartella speciale di MySql, la quale viene controllata all'avvio ed esegue gli script all'interno (in ordine alfabetico), in questo caso gli script d'inizializzazione e popolazione del db. È montato in modalità read-only (ro) per evitare che il container possa modificare i file.
      - ./backend/src/db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s # non contare i fallimenti dell'healthcheck nei primi 30 secondi perche Postgres è lento ad avviarsi
  app:
    container_name: app
    depends_on:
      db:
        condition: service_healthy
    build: .
    env_file:
      - .env
    ports:
      - ${APP_PORT}:3000
    
    #hot-reload (DA TOGLIERE ALLA FINE)
    volumes:
      - ./backend/src:/app/backend/src