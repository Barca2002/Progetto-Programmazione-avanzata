
services:
  db:
    container_name: mysql
    image: mysql:latest
    restart: always
    env_file:
      - .env
    ports:
      - '3306:3306'  
    volumes: 
      - ./backend/src/db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s #non contare i fallimenti dell'healthcheck nei primi 30 secondi perche MYSQL è lento ad avviarsi
  app:
    container_name: app
    depends_on:
      db:
        condition: service_healthy
    build: .
    env_file:
      - .env
    ports:
      - 3000:3000
    
    #hot-reload (DA TOGLIERE ALLA FINE)
    volumes:
      - ./backend/src:/app/backend/src